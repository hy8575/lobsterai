  # ---------------------------------------------------------------------------
  # 7.2 傅里叶变换拥挤度因子 (FFT Crowding)
  # ---------------------------------------------------------------------------

  - factor_id: cicc_crowd_fftv50m5_2024
    name_cn: FFT拥挤度(50分位5分钟)
    name_en: FFT Crowding V50 5min
    category: crowding
    subcategory: fft_crowding
    description: >
      对日内成交量序列做傅里叶变换(FFT)，取50分位以上的频率分量振幅占比，
      采样频率为5分钟。机构拆单的周期性被FFT捕捉为显著的频率成分。
    direction: negative
    data_frequency: 1min_kline
    formula: "NEEDS_DATA_DICT: sum(|FFT(vol_5min)|[top_50pct]) / sum(|FFT(vol_5min)|)"
    source: "NEEDS_DATA_DICT(需要分钟K线表)"
    fields: []
    recommended_suffix: [_std]

