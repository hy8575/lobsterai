  cicc_momentum_24m_2021:
    factor_id: cicc_momentum_24m_2021
    name_cn: 24个月动量
    name_en: 24-Month Momentum
    category: index_enhancement
    formula: >-
      close_adj(t) / close_adj(t-24M) - 1;
      close_adj = close * adj_factor，使用复权收盘价计算
    source: [daily_unadj, adj_factor]
    fields: [close, adj_factor]
    direction: positive

