    subcategory: fft_crowding
    description: >
      傅里叶变换拥挤度，50分位振幅占比，采样频率为10分钟。
      在沪深300内相比其他拥挤度因子表现更好。
    direction: negative
    data_frequency: 1min_kline
    formula: "NEEDS_DATA_DICT: sum(|FFT(vol_10min)|[top_50pct]) / sum(|FFT(vol_10min)|)"
    source: "NEEDS_DATA_DICT(需要分钟K线表)"
