# ============================================================================
# 大类复合因子 & QQC 综合质量因子
# ============================================================================
composites:

  - factor_id: cicc_profitability_2021
    name_cn: 盈利能力复合因子
    abbr: Profitability
    method: equal_weight
    components:
      - cicc_cfoa_2021
      - cicc_roe_2021
      - cicc_roic_2021
    source: [fin_indicator, fin_cashflow, fin_balance]
    fields: [roe, roic, n_cashflow_act, total_assets]

  - factor_id: cicc_growth_2021
    name_cn: 成长能力复合因子
    abbr: Growth
    method: equal_weight
    components:
      - cicc_op_sd_2021
      - cicc_np_acc_2021
      - cicc_op_q_yoy_2021
      - cicc_np_sd_2021
      - cicc_qpt_2021
      - cicc_np_q_yoy_2021
      - cicc_op_yoy_2021
      - cicc_np_yoy_2021
      - cicc_or_yoy_2021
    source: [fin_indicator, fin_income]
    fields: [q_op_yoy, q_netprofit_yoy, op_yoy, netprofit_yoy, or_yoy, n_income_attr_p, end_date]

  - factor_id: cicc_operation_2021
    name_cn: 营运效率复合因子
    abbr: Operation
    method: equal_weight
    components:
      - cicc_atd_2021
      - cicc_ocfa_2021
    source: [fin_indicator, fin_income, fin_balance]
    fields: [assets_turn, total_revenue, operate_profit, fixed_assets]

  - factor_id: cicc_accrual_2021
    name_cn: 盈余质量复合因子
    abbr: Accrual
    method: equal_weight
    components:
      - cicc_apr_2021
    source: [fin_income, fin_cashflow]
    fields: [operate_profit, n_cashflow_act]
    notes: 仅含 APR 一个因子(取反), 因子方向为负

  - factor_id: cicc_safety_2021
    name_cn: 安全性复合因子
    abbr: Safety
    method: equal_weight
    components:
      - cicc_ccr_2021
    source: [fin_cashflow, fin_balance]
    fields: [n_cashflow_act, total_cur_liab]
    notes: 仅含 CCR 一个因子

  - factor_id: cicc_governance_2021
    name_cn: 公司治理复合因子
    abbr: Governance
    method: equal_weight
    components:
      - cicc_mc_percent_2021
      - cicc_mana_income_2021
      - cicc_mana_share_num_2021
      - cicc_deal_method_2021
      - cicc_stock_incentive_2021
    source: [daily_basic]
    fields: [float_share, total_share]
    notes: 5 项指标按方向调整后等权相加; 其中 4 项标记 NEEDS_DATA_DICT

  - factor_id: cicc_qqc_2021
    name_cn: QQC综合质量因子
    name_en: Quantified Quality Composite
    abbr: QQC
    method: equal_weight
    components:
      - cicc_profitability_2021
      - cicc_growth_2021
      - cicc_operation_2021
      - cicc_accrual_2021
      - cicc_safety_2021
      - cicc_governance_2021
    notes: >
      6 大类因子等权加权, 降低过拟合风险。
      样本内 IC=4.51%, IC_IR=0.87 (全市场);
      样本外 IC=5.84%, 月度胜率 87.5%。

# ============================================================================
# 附: 沪深 300 指数增强模型辅助因子
# ============================================================================
enhancement_model:
  name: 基于QQC的沪深300指数增强
  benchmark: "000300.SH"
  rebalance: monthly
  cost: 0.003
  sample_in: ["2011-01-01", "2018-12-31"]
  sample_out: ["2019-01-01", "2020-12-31"]
  weight_method: "rolling_24m_ic_ir"
  qqc_weight_floor: 0.50
  constraints:
    universe: "HS300成分股"
    industry_deviation_max: 0.05
    size_exposure_max: 0.05
    stock_weight_deviation_max: 0.01

  additional_factors:

    - factor_id: cicc_bp_lr_2021
      name_cn: BP（市净率倒数）
      abbr: BP_LR
      direction: positive
      formula: "1.0 / pb"
      source: [daily_basic]
      fields: [pb]

    - factor_id: cicc_momentum_24m_2021
      name_cn: 24个月收益率动量
      abbr: Momentum_24M
      direction: positive
      formula: "close(t) / close(t-24m) - 1"
      source: [monthly_unadj]
      fields: [close]
      notes: 使用月线收盘价计算 24 个月累计收益率

    - factor_id: cicc_turnover_1m_2021
      name_cn: 1个月换手率
      abbr: VA_FC_1M
      direction: negative
      formula: "mean(turnover_rate_f, 20d)"
      source: [daily_basic]
      fields: [turnover_rate_f]
      notes: 最近 20 个交易日自由流通换手率均值

    - factor_id: cicc_dp_2021
      name_cn: 股息率
      abbr: DP
      direction: positive
      formula: "dv_ttm"
      source: [daily_basic]
      fields: [dv_ttm]

    - factor_id: cicc_eep_2021
      name_cn: 一致预期EP
      abbr: EEP
      direction: positive
      formula: "NEEDS_DATA_DICT"
      source: []
      fields: []
      notes: 一致预期数据不在当前数据字典中, 需接入卖方一致预期数据库

    - factor_id: cicc_eechange_3m_2021
      name_cn: 一致预期净利润3个月变动
      abbr: EEChange_3M
      direction: positive
      formula: "NEEDS_DATA_DICT"
      source: []
      fields: []
      notes: 一致预期数据不在当前数据字典中, 需接入卖方一致预期数据库
