  - factor_id: cicc_crowd_origin_v50_2024
    name_cn: 原始成交量中位数拥挤度
    name_en: Raw Volume Median Crowding
    category: crowding
    subcategory: raw_crowding
    description: >
      基于日内成交量序列的中位数以上成交占比，衡量是否存在集中交易行为。
      指标越高表示机构拆单交易越拥挤。
    direction: negative
    data_frequency: 3s_snapshot
    formula: "NEEDS_DATA_DICT: sum(vol_tick where vol_tick > median(vol_tick)) / sum(vol_tick)"
    source: "NEEDS_DATA_DICT(需要3秒快照或逐笔成交表)"
