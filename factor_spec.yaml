# factor_spec.yaml
# 来源研报: 中金公司《量化多因子系列（1）：QQC综合质量因子与指数增强应用》
# 发布日期: 2021-01-14
# 作者: 刘均伟 (S0080520120002), 王汉锋 (S0080513080002)
# 生成说明: 从研报中提取所有可量化因子定义，字段严格匹配 a_share.db 数据字典

meta:
  report_title: "量化多因子系列（1）：QQC综合质量因子与指数增强应用"
  publisher: CICC
  publish_date: "2021-01-14"
  authors:
    - name: 刘均伟
      sac_id: S0080520120002
    - name: 王汉锋
      sac_id: S0080513080002

data:
  database: a_share.db
  align_by: ann_date
  backtest:
    in_sample: ["2009-01-01", "2018-12-31"]
    out_of_sample: ["2019-01-01", "2020-12-31"]
  frequency: monthly
  selection_criteria:
    ic_threshold: 0.02
    ir_threshold: 0.3
    tstat_threshold: 3.0

factors:

  # ================================================================
  # 一、盈利能力 (Profitability) 子因子
  # 选入复合因子: CFOA, ROE, ROIC
  # ================================================================

  cicc_gpm_2021:
    factor_id: cicc_gpm_2021
    name_cn: 毛利率
    name_en: Gross Profit Margin
    category: profitability
    formula: "(revenue - oper_cost) / revenue"
    source: [fin_income]
    fields: [revenue, oper_cost]
    direction: positive
    selected_for_composite: false
    backtest: { ic_mean: 0.0088, ic_ir: 0.12 }

  cicc_npm_2021:
    factor_id: cicc_npm_2021
    name_cn: 净利率
    name_en: Net Profit Margin
    category: profitability
    formula: "netprofit_margin"
    source: [fin_indicator]
    fields: [netprofit_margin]
    direction: positive
    selected_for_composite: false
    backtest: { ic_mean: 0.0091, ic_ir: 0.11 }

  cicc_roe_2021:
    factor_id: cicc_roe_2021
    name_cn: 净资产收益率
    name_en: Return on Equity
    category: profitability
    formula: "roe"
    source: [fin_indicator]
    fields: [roe]
    direction: positive
    selected_for_composite: true
    backtest: { ic_mean: 0.0192, ic_ir: 0.23 }

  cicc_roa_2021:
    factor_id: cicc_roa_2021
    name_cn: 总资产收益率
    name_en: Return on Assets
    category: profitability
    formula: "roa"
    source: [fin_indicator]
    fields: [roa]
    direction: positive
    selected_for_composite: false
    backtest: { ic_mean: 0.0153, ic_ir: 0.16 }

  cicc_roic_2021:
    factor_id: cicc_roic_2021
    name_cn: 投入资本收益率
    name_en: Return on Invested Capital
    category: profitability
    formula: "roic"
    source: [fin_indicator]
    fields: [roic]
    direction: positive
    selected_for_composite: true
    backtest: { ic_mean: 0.0192, ic_ir: 0.24 }

  cicc_oitoebt_2021:
    factor_id: cicc_oitoebt_2021
    name_cn: 经营收益占比
    name_en: Operating Income to EBT
    category: profitability
    formula: "opincome_of_ebt"
    source: [fin_indicator]
    fields: [opincome_of_ebt]
    direction: positive
    selected_for_composite: false
    backtest: { ic_mean: 0.0071, ic_ir: 0.13 }

  cicc_opm_2021:
    factor_id: cicc_opm_2021
    name_cn: 营业利润率
    name_en: Operating Profit Margin
    category: profitability
    formula: "operate_profit / total_revenue"
    source: [fin_income]
    fields: [operate_profit, total_revenue]
    direction: positive
    selected_for_composite: false
    backtest: { ic_mean: 0.0060, ic_ir: 0.08 }

  cicc_gpoa_2021:
    factor_id: cicc_gpoa_2021
    name_cn: 总资产毛利率
    name_en: Gross Profit over Assets
    category: profitability
    formula: "(revenue - oper_cost) / total_assets"
    source: [fin_income, fin_balance]
    fields: [revenue, oper_cost, total_assets]
    direction: positive
    selected_for_composite: false
    backtest: { ic_mean: 0.0147, ic_ir: 0.20 }

  cicc_cfoa_2021:
    factor_id: cicc_cfoa_2021
    name_cn: 经营现金流/总资产
    name_en: Cash Flow from Operations over Assets
    category: profitability
    formula: "n_cashflow_act / total_assets"
    source: [fin_cashflow, fin_balance]
    fields: [n_cashflow_act, total_assets]
    direction: positive
    selected_for_composite: true
    backtest: { ic_mean: 0.0201, ic_ir: 0.47 }

  # ================================================================
  # 二、成长能力 (Growth) 子因子
  # 选入复合因子 (满足IC>2%, IR>0.3, tstat>3):
  #   OP_SD, NP_Acc, OP_Q_YOY, NP_SD, QPT,
  #   NP_Q_YOY, OP_YOY, NP_YOY, OR_YOY
  # 注: 所有增速类因子均使用"与分母值截面回归取残差"进行调整
  # ================================================================

  cicc_np_acc_2021:
    factor_id: cicc_np_acc_2021
    name_cn: 净利润加速度
    name_en: Net Profit Acceleration
    category: growth
    formula: >-
      取最近N=8个单季度净利润序列,
      做二次回归 NP_q = alpha * t^2 + beta * t + c,
      取alpha为加速度代理变量;
      单季净利润 = n_income_attr_p(当季末) - n_income_attr_p(上季末),
      Q1季度直接取当季累计值
    source: [fin_income]
    fields: [n_income_attr_p, end_date]
    direction: positive
    selected_for_composite: true
    backtest: { ic_mean: 0.0277, ic_ir: 0.71 }

  cicc_np_q_yoy_2021:
    factor_id: cicc_np_q_yoy_2021
    name_cn: 净利润增速（单季度同比）
    name_en: Net Profit Single-Quarter YoY
    category: growth
    formula: >-
      residual(cross_sectional_regress(q_netprofit_yoy, lag_base_np));
      对q_netprofit_yoy与上年同期单季净利润做截面回归取残差
    source: [fin_indicator]
    fields: [q_netprofit_yoy]
    direction: positive
    selected_for_composite: true
    backtest: { ic_mean: 0.0355, ic_ir: 0.63 }

  cicc_np_qoq_2021:
    factor_id: cicc_np_qoq_2021
    name_cn: 净利润增速（单季度环比）
    name_en: Net Profit Single-Quarter QoQ
    category: growth
    formula: >-
      residual(cross_sectional_regress(q_netprofit_qoq, lag_base_np))
    source: [fin_indicator]
    fields: [q_netprofit_qoq]
    direction: positive
    selected_for_composite: false
    backtest: { ic_mean: 0.0180, ic_ir: 0.51 }

  cicc_np_sd_2021:
    factor_id: cicc_np_sd_2021
    name_cn: 净利润稳健加速度
    name_en: Net Profit Stable-growth Delta
    category: growth
    formula: >-
      NP_Stable(t) - NP_Stable(t-1);
      NP_Stable = mean(q_netprofit_yoy, 过去8个季度)
                  / std(q_netprofit_yoy, 过去8个季度)
    source: [fin_indicator]
    fields: [q_netprofit_yoy]
    direction: positive
    selected_for_composite: true
    backtest: { ic_mean: 0.0238, ic_ir: 0.68 }

  cicc_np_stable_2021:
    factor_id: cicc_np_stable_2021
    name_cn: 净利润稳健增速
    name_en: Net Profit Stable Growth
    category: growth
    formula: >-
      mean(q_netprofit_yoy, 过去8个季度)
      / std(q_netprofit_yoy, 过去8个季度)
    source: [fin_indicator]
    fields: [q_netprofit_yoy]
    direction: positive
    selected_for_composite: false
    backtest: { ic_mean: 0.0161, ic_ir: 0.22 }

  cicc_np_yoy_2021:
    factor_id: cicc_np_yoy_2021
    name_cn: 净利润增速（TTM同比）
    name_en: Net Profit TTM YoY
    category: growth
    formula: >-
      residual(cross_sectional_regress(netprofit_yoy, lag_np_ttm))
    source: [fin_indicator]
    fields: [netprofit_yoy]
    direction: positive
    selected_for_composite: true
    backtest: { ic_mean: 0.0301, ic_ir: 0.49 }

  cicc_qpt_2021:
    factor_id: cicc_qpt_2021
    name_cn: 业绩趋势因子
    name_en: Quarterly Profit Trend
    category: growth
    formula: >-
      分层打分法:
      (1) 依据NP_Q_YOY将全市场均分三组打分(高=3,中=2,低=1);
      (2) 每组内依据NP_Acc做标准化打分;
      (3) 两步得分相加为最终得分;
      月频更新, 优先级: 定期报告 > 业绩快报 > 业绩预告(净利润下限);
      NEEDS_DATA_DICT: 业绩预告/业绩快报数据(forecast/express)
    source: [fin_indicator, fin_income]
    fields: [q_netprofit_yoy, n_income_attr_p, end_date]
    direction: positive
    selected_for_composite: true
    backtest: { ic_mean: 0.0344, ic_ir: 0.57 }

  cicc_op_q_yoy_2021:
    factor_id: cicc_op_q_yoy_2021
    name_cn: 营业利润增速（单季度同比）
    name_en: Operating Profit Single-Quarter YoY
    category: growth
    formula: >-
      residual(cross_sectional_regress(q_op_yoy, lag_base_op));
      对q_op_yoy与上年同期单季营业利润做截面回归取残差
    source: [fin_indicator]
    fields: [q_op_yoy]
    direction: positive
    selected_for_composite: true
    backtest: { ic_mean: 0.0351, ic_ir: 0.68 }

  cicc_op_qoq_2021:
    factor_id: cicc_op_qoq_2021
    name_cn: 营业利润增速（单季度环比）
    name_en: Operating Profit Single-Quarter QoQ
    category: growth
    formula: >-
      residual(cross_sectional_regress(q_op_qoq, lag_base_op))
    source: [fin_indicator]
    fields: [q_op_qoq]
    direction: positive
    selected_for_composite: false
    backtest: { ic_mean: 0.0160, ic_ir: 0.51 }

  cicc_op_sd_2021:
    factor_id: cicc_op_sd_2021
    name_cn: 营业利润稳健加速度
    name_en: Operating Profit Stable-growth Delta
    category: growth
    formula: >-
      OP_Stable(t) - OP_Stable(t-1);
      OP_Stable = mean(q_op_yoy, 过去8个季度)
                  / std(q_op_yoy, 过去8个季度)
    source: [fin_indicator]
    fields: [q_op_yoy]
    direction: positive
    selected_for_composite: true
    backtest: { ic_mean: 0.0255, ic_ir: 0.73 }

  cicc_op_stable_2021:
    factor_id: cicc_op_stable_2021
    name_cn: 营业利润稳健增速
    name_en: Operating Profit Stable Growth
    category: growth
    formula: >-
      mean(q_op_yoy, 过去8个季度)
      / std(q_op_yoy, 过去8个季度)
    source: [fin_indicator]
    fields: [q_op_yoy]
    direction: positive
    selected_for_composite: false
    backtest: { ic_mean: 0.0142, ic_ir: 0.20 }

  cicc_op_yoy_2021:
    factor_id: cicc_op_yoy_2021
    name_cn: 营业利润增速（TTM同比）
    name_en: Operating Profit TTM YoY
    category: growth
    formula: >-
      residual(cross_sectional_regress(op_yoy, lag_op_ttm))
    source: [fin_indicator]
    fields: [op_yoy]
    direction: positive
    selected_for_composite: true
    backtest: { ic_mean: 0.0301, ic_ir: 0.53 }

  cicc_or_sd_2021:
    factor_id: cicc_or_sd_2021
    name_cn: 营业收入稳健加速度
    name_en: Revenue Stable-growth Delta
    category: growth
    formula: >-
      OR_Stable(t) - OR_Stable(t-1);
      OR_Stable = mean(q_gr_yoy, 过去8个季度)
                  / std(q_gr_yoy, 过去8个季度)
    source: [fin_indicator]
    fields: [q_gr_yoy]
    direction: positive
    selected_for_composite: false
    backtest: { ic_mean: 0.0154, ic_ir: 0.44 }

  cicc_or_stable_2021:
    factor_id: cicc_or_stable_2021
    name_cn: 营业收入稳健增速
    name_en: Revenue Stable Growth
    category: growth
    formula: >-
      mean(q_gr_yoy, 过去8个季度)
      / std(q_gr_yoy, 过去8个季度)
    source: [fin_indicator]
    fields: [q_gr_yoy]
    direction: positive
    selected_for_composite: false
    backtest: { ic_mean: 0.0151, ic_ir: 0.22 }

  cicc_or_yoy_2021:
    factor_id: cicc_or_yoy_2021
    name_cn: 营业收入增速（TTM同比）
    name_en: Revenue TTM YoY
    category: growth
    formula: >-
      residual(cross_sectional_regress(or_yoy, lag_revenue_ttm))
    source: [fin_indicator]
    fields: [or_yoy]
    direction: positive
    selected_for_composite: true
    backtest: { ic_mean: 0.0242, ic_ir: 0.37 }

  cicc_cfoad_2021:
    factor_id: cicc_cfoad_2021
    name_cn: 经营现金流/总资产变动
    name_en: CFOA Delta
    category: growth
    formula: >-
      cfoa(t) - cfoa(t-1);
      cfoa = n_cashflow_act / total_assets
    source: [fin_cashflow, fin_balance]
    fields: [n_cashflow_act, total_assets]
    direction: positive
    selected_for_composite: false
    backtest: { ic_mean: 0.0117, ic_ir: 0.44 }

  cicc_gpmd_2021:
    factor_id: cicc_gpmd_2021
    name_cn: 毛利率变动
    name_en: Gross Margin Delta
    category: growth
    formula: "grossprofit_margin(t) - grossprofit_margin(t-1)"
    source: [fin_indicator]
    fields: [grossprofit_margin]
    direction: positive
    selected_for_composite: false
    backtest: { ic_mean: 0.0114, ic_ir: 0.36 }

  cicc_gpoad_2021:
    factor_id: cicc_gpoad_2021
    name_cn: 总资产毛利率变动
    name_en: GPOA Delta
    category: growth
    formula: "gpoa(t) - gpoa(t-1)"
    source: [fin_income, fin_balance]
    fields: [revenue, oper_cost, total_assets]
    direction: positive
    selected_for_composite: false
    backtest: { ic_mean: 0.0143, ic_ir: 0.34 }

  cicc_npmd_2021:
    factor_id: cicc_npmd_2021
    name_cn: 净利率变动
    name_en: Net Margin Delta
    category: growth
    formula: "netprofit_margin(t) - netprofit_margin(t-1)"
    source: [fin_indicator]
    fields: [netprofit_margin]
    direction: positive
    selected_for_composite: false
    backtest: { ic_mean: 0.0119, ic_ir: 0.30 }

  cicc_road_2021:
    factor_id: cicc_road_2021
    name_cn: ROA变动
    name_en: ROA Delta
    category: growth
    formula: "roa(t) - roa(t-1)"
    source: [fin_indicator]
    fields: [roa]
    direction: positive
    selected_for_composite: false
    backtest: { ic_mean: 0.0117, ic_ir: 0.26 }

  cicc_roed_2021:
    factor_id: cicc_roed_2021
    name_cn: ROE变动
    name_en: ROE Delta
    category: growth
    formula: "roe(t) - roe(t-1)"
    source: [fin_indicator]
    fields: [roe]
    direction: positive
    selected_for_composite: false
    backtest: { ic_mean: 0.0147, ic_ir: 0.31 }

  cicc_roicd_2021:
    factor_id: cicc_roicd_2021
    name_cn: 投入资本收益率变动
    name_en: ROIC Delta
    category: growth
    formula: "roic(t) - roic(t-1)"
    source: [fin_indicator]
    fields: [roic]
    direction: positive
    selected_for_composite: false
    backtest: { ic_mean: 0.0145, ic_ir: 0.36 }

  # ================================================================
  # 三、营运效率 (Operation) 子因子
  # 选入复合因子: ATD, OCFA
  # ================================================================

  cicc_invt_2021:
    factor_id: cicc_invt_2021
    name_cn: 存货周转率
    name_en: Inventory Turnover
    category: operation
    formula: "inv_turn"
    source: [fin_indicator]
    fields: [inv_turn]
    direction: positive
    selected_for_composite: false
    backtest: { ic_mean: 0.0023, ic_ir: 0.05 }

  cicc_invtd_2021:
    factor_id: cicc_invtd_2021
    name_cn: 存货周转率变动
    name_en: Inventory Turnover Delta
    category: operation
    formula: "inv_turn(t) - inv_turn(t-1)"
    source: [fin_indicator]
    fields: [inv_turn]
    direction: positive
    selected_for_composite: false
    backtest: { ic_mean: 0.0097, ic_ir: 0.36 }

  cicc_rat_2021:
    factor_id: cicc_rat_2021
    name_cn: 应收周转率
    name_en: Receivable Turnover
    category: operation
    formula: "ar_turn"
    source: [fin_indicator]
    fields: [ar_turn]
    direction: positive
    selected_for_composite: false
    backtest: { ic_mean: 0.0059, ic_ir: 0.12 }

  cicc_ratd_2021:
    factor_id: cicc_ratd_2021
    name_cn: 应收周转率变动
    name_en: Receivable Turnover Delta
    category: operation
    formula: "ar_turn(t) - ar_turn(t-1)"
    source: [fin_indicator]
    fields: [ar_turn]
    direction: positive
    selected_for_composite: false
    backtest: { ic_mean: 0.0122, ic_ir: 0.41 }

  cicc_at_2021:
    factor_id: cicc_at_2021
    name_cn: 总资产周转率
    name_en: Asset Turnover
    category: operation
    formula: "assets_turn"
    source: [fin_indicator]
    fields: [assets_turn]
    direction: positive
    selected_for_composite: false
    backtest: { ic_mean: 0.0126, ic_ir: 0.27 }

  cicc_atd_2021:
    factor_id: cicc_atd_2021
    name_cn: 总资产周转率变动
    name_en: Asset Turnover Delta
    category: operation
    formula: "assets_turn(t) - assets_turn(t-1)"
    source: [fin_indicator]
    fields: [assets_turn]
    direction: positive
    selected_for_composite: true
    backtest: { ic_mean: 0.0215, ic_ir: 0.55 }

  cicc_ocfa_2021:
    factor_id: cicc_ocfa_2021
    name_cn: 产能利用率提升
    name_en: Operation Cost on Fixed Assets (residual)
    category: operation
    formula: >-
      个股时间序列滚动回归:
      (total_revenue - operate_profit) = alpha + beta * fixed_assets + epsilon,
      取最近一期残差epsilon;
      其中(total_revenue - operate_profit)为营业总成本的近似
    source: [fin_income, fin_balance]
    fields: [total_revenue, operate_profit, fixed_assets]
    direction: positive
    selected_for_composite: true
    backtest: { ic_mean: 0.0173, ic_ir: 0.52 }

  # ================================================================
  # 四、盈余质量 (Accrual) 子因子
  # 选入复合因子: APR (该大类无因子满足全部筛选标准，取代表性因子)
  # ================================================================

  cicc_apr_2021:
    factor_id: cicc_apr_2021
    name_cn: 应计利润占比
    name_en: Accrual Profit Ratio
    category: accrual
    formula: "(operate_profit - n_cashflow_act) / operate_profit"
    source: [fin_income, fin_cashflow]
    fields: [operate_profit, n_cashflow_act]
    direction: negative
    selected_for_composite: true
    backtest: { ic_mean: -0.0123, ic_ir: -0.42 }

  cicc_aprd_2021:
    factor_id: cicc_aprd_2021
    name_cn: 应计利润占比变动
    name_en: Accrual Ratio Delta
    category: accrual
    formula: "apr(t) - apr(t-1)"
    source: [fin_income, fin_cashflow]
    fields: [operate_profit, n_cashflow_act]
    direction: negative
    selected_for_composite: false
    backtest: { ic_mean: -0.0033, ic_ir: -0.14 }

  cicc_csr_2021:
    factor_id: cicc_csr_2021
    name_cn: 收现比
    name_en: Cash-to-Sales Ratio
    category: accrual
    formula: >-
      c_inf_fr_operate_a / revenue;
      原始定义为"销售商品提供劳务收到的现金 / 营业收入",
      此处以经营活动现金流入小计(c_inf_fr_operate_a)近似
    source: [fin_cashflow, fin_income]
    fields: [c_inf_fr_operate_a, revenue]
    direction: positive
    selected_for_composite: false
    backtest: { ic_mean: 0.0069, ic_ir: 0.24 }

  cicc_csrd_2021:
    factor_id: cicc_csrd_2021
    name_cn: 收现比变动
    name_en: CSR Delta
    category: accrual
    formula: "csr(t) - csr(t-1)"
    source: [fin_cashflow, fin_income]
    fields: [c_inf_fr_operate_a, revenue]
    direction: positive
    selected_for_composite: false
    backtest: { ic_mean: 0.0007, ic_ir: 0.03 }

  # ================================================================
  # 五、安全性 (Safety) 子因子
  # 选入复合因子: CCR (该大类无因子满足全部筛选标准，取代表性因子)
  # ================================================================

  cicc_ccr_2021:
    factor_id: cicc_ccr_2021
