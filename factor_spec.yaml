# ============================================================================
# QQC 综合质量因子规范 (Factor Specification)
# 来源: 中金公司 - 量化多因子系列（1）：QQC综合质量因子与指数增强应用
# 发布日期: 2021-01-14
# 作者: 刘均伟, 王汉锋
# ============================================================================

meta:
  report_title: "量化多因子系列（1）：QQC综合质量因子与指数增强应用"
  publisher: CICC
  publisher_cn: 中金公司
  authors: ["刘均伟", "王汉锋"]
  publish_date: "2021-01-14"
  sample_in: ["2009-01-01", "2018-12-31"]
  sample_out: ["2019-01-01", "2020-12-31"]
  factor_id_prefix: cicc

data:
  database: a_share.db
  align_by: ann_date
  freq: monthly

preprocessing:
  growth_residualize:
    description: >
      对所有同比增速/环比增速类因子, 在截面上对分母值(基期值)做回归取残差,
      以消除基期值对增速分布的影响。
      growth_rate_i = alpha + beta * base_value_i + epsilon_i,
      使用 epsilon_i 作为调整后的增速因子值。
    applies_to:
      - cicc_np_q_yoy_2021
      - cicc_np_qoq_2021
      - cicc_np_yoy_2021
      - cicc_op_q_yoy_2021
      - cicc_op_qoq_2021
      - cicc_op_yoy_2021
      - cicc_or_yoy_2021

# ============================================================================
# 一、盈利能力 (Profitability) — 9 个子因子, 入选 3 个
# ============================================================================
profitability:
  category_id: profitability
  name_cn: 盈利能力
  name_en: Profitability
  combination:
    method: equal_weight
    selected:
      - cicc_cfoa_2021
      - cicc_roe_2021
      - cicc_roic_2021

  factors:

    - factor_id: cicc_gpm_2021
      name_cn: 毛利率
      abbr: GPM
      direction: positive
      selected: false
      formula: "(revenue - oper_cost) / revenue"
      source: [fin_income]
      fields: [revenue, oper_cost]
      alt_formula: "grossprofit_margin"
      alt_source: [fin_indicator]
      alt_fields: [grossprofit_margin]

    - factor_id: cicc_npm_2021
      name_cn: 净利率
      abbr: NPM
      direction: positive
      selected: false
      formula: "netprofit_margin"
      source: [fin_indicator]
      fields: [netprofit_margin]

    - factor_id: cicc_roe_2021
      name_cn: 净资产收益率
      abbr: ROE
      direction: positive
      selected: true
      formula: "roe"
      source: [fin_indicator]
      fields: [roe]

    - factor_id: cicc_roa_2021
      name_cn: 总资产收益率
      abbr: ROA
      direction: positive
      selected: false
      formula: "roa"
      source: [fin_indicator]
      fields: [roa]

    - factor_id: cicc_roic_2021
      name_cn: 投入资本收益率
      abbr: ROIC
      direction: positive
      selected: true
      formula: "roic"
      source: [fin_indicator]
      fields: [roic]

    - factor_id: cicc_oitoebt_2021
      name_cn: 经营收益占比
      abbr: OItoEBT
      direction: positive
      selected: false
      formula: "opincome_of_ebt"
      source: [fin_indicator]
      fields: [opincome_of_ebt]

    - factor_id: cicc_opm_2021
      name_cn: 营业利润率
      abbr: OPM
      direction: positive
      selected: false
      formula: "op_of_gr"
      source: [fin_indicator]
      fields: [op_of_gr]

    - factor_id: cicc_gpoa_2021
      name_cn: 总资产毛利率
      abbr: GPOA
      direction: positive
      selected: false
      formula: "(revenue - oper_cost) / total_assets"
      source: [fin_income, fin_balance]
      fields: [revenue, oper_cost, total_assets]

    - factor_id: cicc_cfoa_2021
      name_cn: 经营现金流/总资产
      abbr: CFOA
      direction: positive
      selected: true
      formula: "n_cashflow_act / total_assets"
      source: [fin_cashflow, fin_balance]
      fields: [n_cashflow_act, total_assets]

# ============================================================================
# 二、成长能力 (Growth) — 22 个子因子, 入选 9 个
# ============================================================================
growth:
  category_id: growth
  name_cn: 成长能力
  name_en: Growth
  combination:
    method: equal_weight
    selected:
      - cicc_op_sd_2021
      - cicc_np_acc_2021
      - cicc_op_q_yoy_2021
      - cicc_np_sd_2021
      - cicc_qpt_2021
      - cicc_np_q_yoy_2021
      - cicc_op_yoy_2021
      - cicc_np_yoy_2021
      - cicc_or_yoy_2021

  factors:

    # --- TTM 同比增速 ---

    - factor_id: cicc_np_yoy_2021
      name_cn: 净利润增速（TTM同比）
      abbr: NP_YOY
      direction: positive
      selected: true
      formula: "netprofit_yoy"
      source: [fin_indicator]
      fields: [netprofit_yoy]
      notes: 截面上对基期净利润回归取残差

    - factor_id: cicc_op_yoy_2021
      name_cn: 营业利润增速（TTM同比）
      abbr: OP_YOY
      direction: positive
      selected: true
      formula: "op_yoy"
      source: [fin_indicator]
      fields: [op_yoy]
      notes: 截面上对基期营业利润回归取残差

    - factor_id: cicc_or_yoy_2021
      name_cn: 营业收入增速（TTM同比）
      abbr: OR_YOY
      direction: positive
      selected: true
      formula: "or_yoy"
      source: [fin_indicator]
      fields: [or_yoy]
      notes: 截面上对基期营业收入回归取残差

    # --- 单季度同比增速 ---

    - factor_id: cicc_np_q_yoy_2021
      name_cn: 净利润增速（单季度同比）
      abbr: NP_Q_YOY
      direction: positive
      selected: true
      formula: "q_netprofit_yoy"
      source: [fin_indicator]
      fields: [q_netprofit_yoy]
      notes: 截面上对基期单季净利润回归取残差

    - factor_id: cicc_op_q_yoy_2021
      name_cn: 营业利润增速（单季度同比）
      abbr: OP_Q_YOY
      direction: positive
      selected: true
      formula: "q_op_yoy"
      source: [fin_indicator]
      fields: [q_op_yoy]
      notes: 截面上对基期单季营业利润回归取残差

    # --- 单季度环比增速 ---

    - factor_id: cicc_np_qoq_2021
      name_cn: 净利润增速（单季度环比）
      abbr: NP_QOQ
      direction: positive
      selected: false
      formula: "q_netprofit_qoq"
      source: [fin_indicator]
      fields: [q_netprofit_qoq]
      notes: 截面上对基期单季净利润回归取残差

    - factor_id: cicc_op_qoq_2021
      name_cn: 营业利润增速（单季度环比）
      abbr: OP_QOQ
      direction: positive
      selected: false
      formula: "q_op_qoq"
      source: [fin_indicator]
      fields: [q_op_qoq]
      notes: 截面上对基期单季营业利润回归取残差

    # --- 加速度因子 ---

    - factor_id: cicc_np_acc_2021
      name_cn: 净利润加速度
      abbr: NP_Acc
      direction: positive
      selected: true
      formula: >
        对连续 N=8 个季度的单季净利润 NP_t 对期数 t 做二次回归:
        NP_t = alpha * t^2 + beta * t + c,
        取二次项系数 alpha 作为加速度代理变量。
        单季净利润 = n_income_attr_p(当期) - n_income_attr_p(上期同年),
        其中 Q1 直接取 n_income_attr_p。
      source: [fin_income]
      fields: [n_income_attr_p, end_date]
      params:
        N: 8

    # --- 稳健增速 & 稳健加速度 ---

    - factor_id: cicc_np_stable_2021
      name_cn: 净利润稳健增速
      abbr: NP_Stable
      direction: positive
      selected: false
      formula: "mean(q_netprofit_yoy, N=8) / std(q_netprofit_yoy, N=8)"
      source: [fin_indicator]
      fields: [q_netprofit_yoy]
      params:
        N: 8

    - factor_id: cicc_np_sd_2021
      name_cn: 净利润稳健加速度
      abbr: NP_SD
      direction: positive
      selected: true
      formula: "NP_Stable(t) - NP_Stable(t-1)"
      depends_on: [cicc_np_stable_2021]
      source: [fin_indicator]
      fields: [q_netprofit_yoy]
      params:
        N: 8

    - factor_id: cicc_op_stable_2021
      name_cn: 营业利润稳健增速
      abbr: OP_Stable
      direction: positive
      selected: false
      formula: "mean(q_op_yoy, N=8) / std(q_op_yoy, N=8)"
      source: [fin_indicator]
      fields: [q_op_yoy]
      params:
        N: 8

    - factor_id: cicc_op_sd_2021
      name_cn: 营业利润稳健加速度
      abbr: OP_SD
      direction: positive
      selected: true
      formula: "OP_Stable(t) - OP_Stable(t-1)"
      depends_on: [cicc_op_stable_2021]
      source: [fin_indicator]
      fields: [q_op_yoy]
      params:
        N: 8

    - factor_id: cicc_or_stable_2021
      name_cn: 营业收入稳健增速
      abbr: OR_Stable
      direction: positive
      selected: false
      formula: "mean(or_yoy_quarterly, N=8) / std(or_yoy_quarterly, N=8)"
      source: [fin_indicator]
      fields: [q_sales_yoy]
      params:
        N: 8

    - factor_id: cicc_or_sd_2021
      name_cn: 营业收入稳健加速度
      abbr: OR_SD
      direction: positive
      selected: false
      formula: "OR_Stable(t) - OR_Stable(t-1)"
      depends_on: [cicc_or_stable_2021]
      source: [fin_indicator]
      fields: [q_sales_yoy]
      params:
        N: 8

    # --- 业绩趋势因子 ---

    - factor_id: cicc_qpt_2021
      name_cn: 业绩趋势因子
      abbr: QPT
      direction: positive
      selected: true
      formula: >
        分层打分法:
        Step1: 按 NP_Q_YOY 将全市场股票均分为 3 组, 最高组=3, 中间=2, 最低=1;
        Step2: 每组内按 NP_Acc 做标准化打分(z-score);
        Step3: 最终得分 = Step1_score + Step2_score。
        数据更新优先级: 定期报告 > 业绩快报 > 业绩预告。
      depends_on: [cicc_np_q_yoy_2021, cicc_np_acc_2021]
      source: [fin_indicator, fin_income]
      fields: [q_netprofit_yoy, n_income_attr_p, end_date]

    # --- 变动类因子 ---

    - factor_id: cicc_cfoad_2021
      name_cn: 经营现金流/总资产变动
      abbr: CFOAD
      direction: positive
      selected: false
      formula: "CFOA(t) - CFOA(t-1)"
      depends_on: [cicc_cfoa_2021]
      source: [fin_cashflow, fin_balance]
      fields: [n_cashflow_act, total_assets]

    - factor_id: cicc_gpmd_2021
      name_cn: 毛利率变动
      abbr: GPMD
      direction: positive
      selected: false
      formula: "grossprofit_margin(t) - grossprofit_margin(t-1)"
      source: [fin_indicator]
      fields: [grossprofit_margin]

    - factor_id: cicc_gpoad_2021
      name_cn: 总资产毛利率变动
      abbr: GPOAD
      direction: positive
      selected: false
      formula: "GPOA(t) - GPOA(t-1)"
      depends_on: [cicc_gpoa_2021]
      source: [fin_income, fin_balance]
      fields: [revenue, oper_cost, total_assets]

    - factor_id: cicc_npmd_2021
      name_cn: 净利率变动
      abbr: NPMD
      direction: positive
      selected: false
      formula: "netprofit_margin(t) - netprofit_margin(t-1)"
      source: [fin_indicator]
      fields: [netprofit_margin]

    - factor_id: cicc_road_2021
      name_cn: ROA变动
      abbr: ROAD
      direction: positive
      selected: false
      formula: "roa(t) - roa(t-1)"
      source: [fin_indicator]
      fields: [roa]

    - factor_id: cicc_roed_2021
      name_cn: ROE变动
      abbr: ROED
      direction: positive
      selected: false
      formula: "roe(t) - roe(t-1)"
      source: [fin_indicator]
      fields: [roe]

    - factor_id: cicc_roicd_2021
      name_cn: 投入资本收益率变动
      abbr: ROICD
      direction: positive
      selected: false
      formula: "roic(t) - roic(t-1)"
      source: [fin_indicator]
      fields: [roic]

# ============================================================================
# 三、营运效率 (Operation) — 7 个子因子, 入选 2 个
# ============================================================================
operation:
  category_id: operation
  name_cn: 营运效率
  name_en: Operation
  combination:
    method: equal_weight
    selected:
      - cicc_atd_2021
      - cicc_ocfa_2021

  factors:

    - factor_id: cicc_invt_2021
      name_cn: 存货周转率
      abbr: INVT
      direction: positive
      selected: false
      formula: "inv_turn"
      source: [fin_indicator]
      fields: [inv_turn]

    - factor_id: cicc_invtd_2021
      name_cn: 存货周转率变动
      abbr: INVTD
      direction: positive
      selected: false
      formula: "inv_turn(t) - inv_turn(t-1)"
      source: [fin_indicator]
      fields: [inv_turn]

    - factor_id: cicc_rat_2021
      name_cn: 应收周转率
      abbr: RAT
      direction: positive
      selected: false
      formula: "ar_turn"
      source: [fin_indicator]
      fields: [ar_turn]

    - factor_id: cicc_ratd_2021
      name_cn: 应收周转率变动
      abbr: RATD
      direction: positive
      selected: false
      formula: "ar_turn(t) - ar_turn(t-1)"
      source: [fin_indicator]
      fields: [ar_turn]

    - factor_id: cicc_at_2021
      name_cn: 总资产周转率
      abbr: AT
      direction: positive
      selected: false
      formula: "assets_turn"
      source: [fin_indicator]
      fields: [assets_turn]

    - factor_id: cicc_atd_2021
      name_cn: 总资产周转率变动
      abbr: ATD
      direction: positive
      selected: true
      formula: "assets_turn(t) - assets_turn(t-1)"
      source: [fin_indicator]
      fields: [assets_turn]

    - factor_id: cicc_ocfa_2021
      name_cn: 产能利用率提升
      abbr: OCFA
      direction: positive
      selected: true
      formula: >
        对每只股票做时间序列滚动回归:
        (total_revenue - operate_profit) = alpha + beta * fixed_assets + epsilon,
        取最近一期残差 epsilon 作为 OCFA。
        其中 (total_revenue - operate_profit) 近似营业总成本。
      source: [fin_income, fin_balance]
      fields: [total_revenue, operate_profit, fixed_assets]

# ============================================================================
# 四、盈余质量 (Accrual) — 4 个子因子, 入选 1 个
# ============================================================================
accrual:
  category_id: accrual
  name_cn: 盈余质量
  name_en: Accrual
  combination:
    method: equal_weight
    selected:
      - cicc_apr_2021

  factors:

    - factor_id: cicc_apr_2021
      name_cn: 应计利润占比
      abbr: APR
      direction: negative
      selected: true
      formula: "(operate_profit - n_cashflow_act) / operate_profit"
      source: [fin_income, fin_cashflow]
      fields: [operate_profit, n_cashflow_act]
      notes: 值越大盈余质量越差, 因子方向为负

    - factor_id: cicc_aprd_2021
      name_cn: 应计利润占比变动
      abbr: APRD
      direction: negative
      selected: false
      formula: "APR(t) - APR(t-1)"
      depends_on: [cicc_apr_2021]
      source: [fin_income, fin_cashflow]
      fields: [operate_profit, n_cashflow_act]

    - factor_id: cicc_csr_2021
      name_cn: 收现比
      abbr: CSR
      direction: positive
      selected: false
      formula: "salescash_to_or"
      source: [fin_indicator]
      fields: [salescash_to_or]

    - factor_id: cicc_csrd_2021
      name_cn: 收现比变动
      abbr: CSRD
      direction: positive
      selected: false
      formula: "salescash_to_or(t) - salescash_to_or(t-1)"
      source: [fin_indicator]
      fields: [salescash_to_or]

# ============================================================================
# 五、安全性 (Safety) — 12 个子因子, 入选 1 个
# ============================================================================
safety:
  category_id: safety
  name_cn: 安全性
  name_en: Safety
  combination:
    method: equal_weight
    selected:
      - cicc_ccr_2021

  factors:

    - factor_id: cicc_ccr_2021
      name_cn: 现金流动负债比率
      abbr: CCR
      direction: positive
      selected: true
      formula: "n_cashflow_act / total_cur_liab"
      source: [fin_cashflow, fin_balance]
      fields: [n_cashflow_act, total_cur_liab]
      alt_formula: "ocf_to_shortdebt"
      alt_source: [fin_indicator]
      alt_fields: [ocf_to_shortdebt]

    - factor_id: cicc_ccrd_2021
      name_cn: 现金流动负债比率变动
      abbr: CCRD
      direction: positive
      selected: false
      formula: "CCR(t) - CCR(t-1)"
      depends_on: [cicc_ccr_2021]
      source: [fin_cashflow, fin_balance]
      fields: [n_cashflow_act, total_cur_liab]

    - factor_id: cicc_cr_2021
      name_cn: 现金比率
      abbr: CR
      direction: positive
      selected: false
      formula: "cash_ratio"
      source: [fin_indicator]
      fields: [cash_ratio]
      notes: "(现金 + 交易性金融资产) / 流动负债"

    - factor_id: cicc_crd_2021
      name_cn: 现金比率变动
      abbr: CRD
      direction: negative
      selected: false
      formula: "cash_ratio(t) - cash_ratio(t-1)"
      source: [fin_indicator]
      fields: [cash_ratio]

    - factor_id: cicc_cur_2021
      name_cn: 流动比率
      abbr: CUR
      direction: positive
      selected: false
      formula: "current_ratio"
      source: [fin_indicator]
      fields: [current_ratio]

    - factor_id: cicc_curd_2021
      name_cn: 流动比率变动
      abbr: CURD
      direction: negative
      selected: false
      formula: "current_ratio(t) - current_ratio(t-1)"
      source: [fin_indicator]
      fields: [current_ratio]

    - factor_id: cicc_dad_2021
      name_cn: 资产负债率变动
      abbr: DAD
      direction: negative
      selected: false
      formula: "debt_to_assets(t) - debt_to_assets(t-1)"
      source: [fin_indicator]
      fields: [debt_to_assets]
      notes: 资产负债率上升代表风险增大, 实测因子IC为正但方向为负(高DAD差)

    - factor_id: cicc_debt_asset_2021
      name_cn: 资产负债率
      abbr: Debt_Asset
      direction: negative
      selected: false
      formula: "debt_to_assets"
      source: [fin_indicator]
      fields: [debt_to_assets]

    - factor_id: cicc_dte_2021
      name_cn: 产权比率
      abbr: DTE
      direction: negative
      selected: false
      formula: "debt_to_eqt"
      source: [fin_indicator]
      fields: [debt_to_eqt]

    - factor_id: cicc_dted_2021
      name_cn: 产权比率变动
      abbr: DTED
      direction: negative
      selected: false
      formula: "debt_to_eqt(t) - debt_to_eqt(t-1)"
      source: [fin_indicator]
      fields: [debt_to_eqt]

    - factor_id: cicc_qr_2021
      name_cn: 速动比率
      abbr: QR
      direction: positive
      selected: false
      formula: "quick_ratio"
      source: [fin_indicator]
      fields: [quick_ratio]

    - factor_id: cicc_qrd_2021
      name_cn: 速动比率变动
      abbr: QRD
      direction: negative
      selected: false
      formula: "quick_ratio(t) - quick_ratio(t-1)"
      source: [fin_indicator]
      fields: [quick_ratio]

# ============================================================================
# 六、公司治理 (Governance) — 5 个子指标, 全部入选
# ============================================================================
governance:
  category_id: governance
  name_cn: 公司治理
  name_en: Governance
  combination:
    method: equal_weight
    selected:
      - cicc_mc_percent_2021
      - cicc_mana_income_2021
      - cicc_mana_share_num_2021
      - cicc_deal_method_2021
      - cicc_stock_incentive_2021

  factors:

    - factor_id: cicc_mc_percent_2021
      name_cn: 流通股占比
      abbr: Mc_percent
      direction: positive
      weight: 1
      selected: true
      formula: "float_share / total_share"
      source: [daily_basic]
      fields: [float_share, total_share]

    - factor_id: cicc_mana_income_2021
      name_cn: 管理层薪酬（前十）
      abbr: Mana_income
      direction: positive
      weight: 1
      selected: true
      formula: "NEEDS_DATA_DICT"
      source: []
      fields: []
