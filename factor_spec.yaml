index_enhancement_model:
  cicc_csi300_enhance_2021:
    name_cn: 基于QQC的沪深300指数增强模型
    benchmark: "沪深300"
    factor_weighting: "rolling_24m_IC_IR"
    qqc_min_weight: 0.5
    rebalance: monthly
    fee_assumption: "单边0.3%"
    constraints:
      universe: "沪深300成分股"
      industry_deviation_max: 0.05
      size_factor_exposure_max: 0.05
      stock_weight_deviation_max: 0.01
    factors:
      - cicc_bp_lr_2021
      - cicc_momentum_24m_2021
      - cicc_va_fc_1m_2021
      - cicc_dp_2021
      - cicc_eep_2021
      - cicc_eechange_3m_2021
      - cicc_qqc_2021
