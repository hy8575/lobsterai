  # ================================================================
  # 沪深300指数增强组合模型
  # ================================================================

  cicc_hs300_enhance_2021:
    factor_id: cicc_hs300_enhance_2021
    name_cn: 基于QQC的沪深300指数增强模型
    name_en: QQC-based HS300 Index Enhancement
    category: portfolio_model
    combination:
      method: rolling_24m_ic_ir_weighted
      sub_factors:
        - cicc_bp_lr_2021
        - cicc_momentum_24m_2021
        - cicc_turnover_1m_2021
        - cicc_dp_2021
        - cicc_eep_2021
        - cicc_eechange_3m_2021
        - cicc_qqc_2021
      constraints:
        qqc_min_weight: 0.50
        note: "QQC因子权重若小于50%则调至50%，其他因子再做归一化处理"
    optimization:
      universe: hs300_constituents
      industry_deviation_max: 0.05
      size_exposure_max: 0.05
      stock_weight_deviation_max: 0.01
      rebalance: monthly
      cost_one_way: 0.003
    backtest:
      in_sample:
        period: ["2011-01-01", "2018-12-31"]
        annual_excess_return: 0.1047
        tracking_error: 0.0337
        information_ratio: 3.11
        monthly_win_rate: 0.79
        max_relative_drawdown: -0.039
      out_of_sample:
        period: ["2019-01-01", "2020-12-31"]
        annual_excess_return: 0.1502
        tracking_error: 0.0365
        information_ratio: 4.11
