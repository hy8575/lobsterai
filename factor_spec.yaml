# =============================================================================
# 高频因子手册 - 因子规格定义
# 来源: 中金《量化多因子系列（12）：高频因子手册》(2024-01-15)
# 发行方: CICC (中金公司)
# 分析师: 周萧潇、郑文才、陈宜筠、胡骥聪、古翔、刘均伟
# =============================================================================

meta:
  report_title: "量化多因子系列（12）：高频因子手册"
  report_date: "2024-01-15"
  publisher: cicc
  authors:
    - 周萧潇
    - 郑文才
    - 陈宜筠
    - 胡骥聪
    - 古翔
    - 刘均伟
  test_period: "2013-01-04 ~ 2023-12-01"
  total_base_factors: 79
  total_composite_factors: 8
  note: >
    本研报因子基于 Level2 日内高频数据（分钟K线、3秒快照、逐笔成交）构建。
    当前数据字典仅包含日/周/月频数据，绝大多数因子需要额外的高频数据源。
    标记 NEEDS_DATA_DICT 的因子表示所需字段不在当前 a_share.db 中。

data:
  align_by: ann_date
  universe_filter:
    exclude_st: true
    exclude_suspended: true
    exclude_limit_up_down: true
    exclude_listed_less_than: 252  # 上市未满一年(约252个交易日)
  filter_tables:
    st_status:
      fields: [ts_code, trade_date, st_type]
    suspension:
      fields: [ts_code, trade_date, suspend_type]
    limit_price:
      fields: [ts_code, trade_date, up_limit, down_limit]
    stock_list:
      fields: [ts_code, list_date, is_delisted]
    daily_unadj:
      fields: [ts_code, trade_date, close, high, low]

combination:
  method: equal_weight

processing_methods:
  description: "每个原始因子有四种日度→期度聚合方法，以后缀区分"
  _o: "每期取最后一个有效值 (last observation)"
  _m: "每期取当期算术平均 (arithmetic mean)"
  _z: "每期取 z-score 标准分 (z-score)"
  _std: "每期取当期标准差 (standard deviation)"

# =============================================================================
# 第一大类: 动量反转因子 (Momentum / Reversal)
# 细分: 分段动量、量能动量、QRS动量
# =============================================================================

factors:

  # ---------------------------------------------------------------------------
  # 1.1 分段动量 (Segmented Momentum)
  # ---------------------------------------------------------------------------

  - factor_id: cicc_mmt_last30_2024
    name_cn: 尾盘30分钟动量
    name_en: Last 30-min Momentum
    category: momentum_reversal
    subcategory: segmented_momentum
    description: >
      收盘前30分钟（14:30-15:00）的累计收益率，
      反映尾盘交易阶段的价格趋势信息。
    direction: negative
    data_frequency: 1min_kline
    formula: "NEEDS_DATA_DICT: sum(ret_1min[t]) for t in [14:30, 15:00], 其中 ret_1min = close_1min(t)/close_1min(t-1) - 1"
    source: "NEEDS_DATA_DICT(需要分钟K线表)"
    fields: []
    recommended_suffix: [_std, _z]
    reference_metrics:
      全市场_weekly_long_short_annual: "47%"
      全市场_monthly_ICIR: "1.00"
      全市场_monthly_long_excess: "5.6%"

  - factor_id: cicc_mmt_between_2024
    name_cn: 中间时段动量
    name_en: Mid-session Momentum
    category: momentum_reversal
    subcategory: segmented_momentum
    description: >
      去除开盘首30分钟和收盘末30分钟后的中间时段累计收益率，
      即 10:00-14:30 的日内收益。
    direction: negative
    data_frequency: 1min_kline
    formula: "NEEDS_DATA_DICT: close_1min(14:30)/close_1min(10:00) - 1"
    source: "NEEDS_DATA_DICT(需要分钟K线表)"
    fields: []
    recommended_suffix: [_m]

  - factor_id: cicc_mmt_pm_2024
    name_cn: 下午时段动量
    name_en: Afternoon Momentum
    category: momentum_reversal
    subcategory: segmented_momentum
    description: >
      下午交易时段（13:00-15:00）的累计收益率。
    direction: negative
    data_frequency: 1min_kline
    formula: "NEEDS_DATA_DICT: close_1min(15:00)/close_1min(13:00) - 1"
    source: "NEEDS_DATA_DICT(需要分钟K线表)"
    fields: []
    recommended_suffix: [_m, _std]
    reference_metrics:
      全市场_weekly_long_short_annual: "58%"

  - factor_id: cicc_mmt_am_2024
    name_cn: 上午时段动量
    name_en: Morning Momentum
    category: momentum_reversal
    subcategory: segmented_momentum
    description: >
      上午交易时段（09:30-11:30）的累计收益率。
    direction: negative
    data_frequency: 1min_kline
    formula: "NEEDS_DATA_DICT: close_1min(11:30)/open_1min(09:30) - 1"
    source: "NEEDS_DATA_DICT(需要分钟K线表)"
    fields: []
    recommended_suffix: [_m, _std]

  # ---------------------------------------------------------------------------
  # 1.2 量能动量 (Volume-weighted Momentum)
  # ---------------------------------------------------------------------------

  - factor_id: cicc_mmt_top20VolumeRet_2024
    name_cn: 高量能K线动量
    name_en: Top-20 Volume Bar Return
    category: momentum_reversal
    subcategory: volume_momentum
    description: >
      日内成交量最大的20根分钟K线对应的收益率之和。
      捕捉高成交量时段的价格动量信息。
    direction: negative
    data_frequency: 1min_kline
    formula: "NEEDS_DATA_DICT: sum(ret_1min[i]) for i in top_20_by_vol_1min, 其中 ret_1min = close_1min/open_1min - 1"
    source: "NEEDS_DATA_DICT(需要分钟K线表)"
    fields: []
    recommended_suffix: [_std, _o]
    reference_metrics:
      全市场_monthly_IC_mean: "-9.52%"
      沪深300_weekly_long_short_annual: "27%"

  - factor_id: cicc_mmt_bot20VolumeRet_2024
    name_cn: 低量能K线动量
    name_en: Bottom-20 Volume Bar Return
    category: momentum_reversal
    subcategory: volume_momentum
    description: >
      日内成交量最小的20根分钟K线对应的收益率之和。
      与 mmt_top20VolumeRet 互补，刻画低活跃时段动量。
    direction: negative
    data_frequency: 1min_kline
    formula: "NEEDS_DATA_DICT: sum(ret_1min[i]) for i in bottom_20_by_vol_1min"
    source: "NEEDS_DATA_DICT(需要分钟K线表)"
    fields: []
    recommended_suffix: [_std, _o]

  # ---------------------------------------------------------------------------
  # 1.3 QRS 动量 (Quantitative Relative Strength)
  # ---------------------------------------------------------------------------

  - factor_id: cicc_mmt_qrs_2024
    name_cn: 日内QRS动量指标
    name_en: Intraday QRS Indicator
    category: momentum_reversal
    subcategory: qrs_momentum
    description: >
      将日度QRS构造方法迁移到分钟K线。滚动50根分钟K线，用最高价和最低价
      对时间序列做OLS回归，QRS = R² × sign(beta)。
      指标越高说明日内趋势性越强。
    direction: negative
    data_frequency: 1min_kline
    formula: "NEEDS_DATA_DICT: R_squared × sign(beta), 其中 OLS: (high_1min + low_1min)/2 ~ time, 滚动窗口=50根分钟K线"
    source: "NEEDS_DATA_DICT(需要分钟K线表)"
    fields: []
    recommended_suffix: [_o]
    reference_metrics:
      全市场_monthly_IC_mean: "-8.07%"
      全市场_monthly_ICIR: "1.00"

  - factor_id: cicc_mmt_ols_r2_2024
    name_cn: 日内OLS回归R方
    name_en: Intraday OLS R-squared
    category: momentum_reversal
    subcategory: qrs_momentum
    description: >
      mmt_qrs 的组成部分。滚动50根分钟K线的价格趋势OLS回归R²，
      衡量日内价格趋势的拟合优度。
    direction: negative
    data_frequency: 1min_kline
    formula: "NEEDS_DATA_DICT: R_squared from OLS: mid_price_1min ~ time, 滚动窗口=50"
    source: "NEEDS_DATA_DICT(需要分钟K线表)"
    fields: []
    recommended_suffix: [_o, _m]

  - factor_id: cicc_mmt_ols_beta_mean_2024
    name_cn: 日内OLS回归Beta均值
    name_en: Intraday OLS Beta Mean
    category: momentum_reversal
    subcategory: qrs_momentum
    description: >
      mmt_qrs 的组成部分。滚动50根分钟K线的价格趋势OLS回归斜率系数，
      取日内均值。表征日内价格趋势的平均方向和强度。
    direction: negative
    data_frequency: 1min_kline
    formula: "NEEDS_DATA_DICT: mean(beta_t) for t in day, 其中 beta_t from OLS: mid_price_1min ~ time, 滚动窗口=50"
    source: "NEEDS_DATA_DICT(需要分钟K线表)"
    fields: []
    recommended_suffix: [_o]
    reference_metrics:
      全市场_monthly_IC_mean: "-7.34%"
      全市场_monthly_ICIR: "1.09"
      全市场_weekly_long_short_annual: "55%"
      全市场_weekly_long_excess_annual: "23%"

  # ===========================================================================
  # 第二大类: 波动率因子 (Volatility)
  # ===========================================================================

  - factor_id: cicc_vol_return1min_2024
    name_cn: 分钟收益波动率
    name_en: 1-min Return Volatility
    category: volatility
    description: >
      日内1分钟收益率的标准差，传统的已实现波动率。
    direction: negative
    data_frequency: 1min_kline
    formula: "NEEDS_DATA_DICT: std(ret_1min[t]) for t in trading_day, 其中 ret_1min = close_1min(t)/close_1min(t-1) - 1"
    source: "NEEDS_DATA_DICT(需要分钟K线表)"
    fields: []
    recommended_suffix: [_o]
    reference_metrics:
      全市场_weekly_long_short_annual: "41%"

  - factor_id: cicc_vol_upVol_2024
    name_cn: 上行波动率
    name_en: Upside Volatility
    category: volatility
    description: >
      仅取日内正收益率（ret_1min > 0）的标准差。
      上行波动率越高，未来收益可能越低。
    direction: negative
    data_frequency: 1min_kline
    formula: "NEEDS_DATA_DICT: std(ret_1min[t]) for t where ret_1min[t] > 0"
    source: "NEEDS_DATA_DICT(需要分钟K线表)"
    fields: []
    recommended_suffix: [_std]
    reference_metrics:
      全市场_monthly_ICIR: "1.35"
      全市场_monthly_IC_mean: "-8.4%"

  - factor_id: cicc_vol_downVol_2024
    name_cn: 下行波动率
    name_en: Downside Volatility
    category: volatility
    description: >
      仅取日内负收益率（ret_1min < 0）的标准差。
    direction: negative
    data_frequency: 1min_kline
    formula: "NEEDS_DATA_DICT: std(ret_1min[t]) for t where ret_1min[t] < 0"
    source: "NEEDS_DATA_DICT(需要分钟K线表)"
    fields: []
    recommended_suffix: [_std]

  - factor_id: cicc_vol_range1min_2024
    name_cn: 分钟振幅波动率
    name_en: 1-min Range Volatility
    category: volatility
    description: >
      日内1分钟K线振幅（high-low）/close的标准差。
    direction: negative
    data_frequency: 1min_kline
    formula: "NEEDS_DATA_DICT: std((high_1min - low_1min) / close_1min) over trading_day"
    source: "NEEDS_DATA_DICT(需要分钟K线表)"
    fields: []
    recommended_suffix: [_std]

  - factor_id: cicc_vol_volume1min_2024
    name_cn: 分钟成交量波动率
    name_en: 1-min Volume Volatility
    category: volatility
    description: >
      日内1分钟成交量的变异系数（标准差/均值），衡量日内成交量分布的不均匀程度。
    direction: negative
    data_frequency: 1min_kline
    formula: "NEEDS_DATA_DICT: std(vol_1min) / mean(vol_1min) over trading_day"
    source: "NEEDS_DATA_DICT(需要分钟K线表)"
    fields: []
    recommended_suffix: [_o]
    reference_metrics:
      全市场_weekly_long_short_annual: "44%"

  - factor_id: cicc_vol_downRatio_2024
    name_cn: 日内下跌占比
    name_en: Down-minute Ratio
    category: volatility
    description: >
      日内下跌分钟数占总交易分钟数的比例。下跌占比越高，未来表现可能越差。
    direction: negative
    data_frequency: 1min_kline
    formula: "NEEDS_DATA_DICT: count(ret_1min < 0) / count(ret_1min) over trading_day"
    source: "NEEDS_DATA_DICT(需要分钟K线表)"
    fields: []
    recommended_suffix: [_o]
    reference_metrics:
      全市场_weekly_long_excess_annual: "14%"

  - factor_id: cicc_vol_upRatio_2024
    name_cn: 日内上涨占比
    name_en: Up-minute Ratio
    category: volatility
    description: >
      日内上涨分钟数占总交易分钟数的比例。与 vol_downRatio 互补。
    direction: positive
    data_frequency: 1min_kline
    formula: "NEEDS_DATA_DICT: count(ret_1min > 0) / count(ret_1min) over trading_day"
    source: "NEEDS_DATA_DICT(需要分钟K线表)"
    fields: []
    recommended_suffix: [_o]

  # ===========================================================================
  # 第三大类: 高阶特征因子 (Higher-order Moments)
  # ===========================================================================

  - factor_id: cicc_shape_skew_2024
    name_cn: 分钟收益偏度
    name_en: Intraday Return Skewness
    category: higher_order
    subcategory: return_moments
    description: >
      日内分钟收益率的三阶标准矩（偏度）。正偏度反映价格右尾较重，
      研究显示高正偏度的股票未来表现较差（彩票效应）。
    direction: negative
    data_frequency: 1min_kline
    formula: "NEEDS_DATA_DICT: skewness(ret_1min) over trading_day"
    source: "NEEDS_DATA_DICT(需要分钟K线表)"
    fields: []
    recommended_suffix: [_m, _std]
    reference_metrics:
      全市场_monthly_ICIR: "1.28"
      全市场_weekly_long_short_annual: "29.2%"

  - factor_id: cicc_shape_kurt_2024
    name_cn: 分钟收益峰度
    name_en: Intraday Return Kurtosis
    category: higher_order
    subcategory: return_moments
    description: >
      日内分钟收益率的四阶标准矩（峰度）。高峰度反映尾部风险较大。
    direction: negative
    data_frequency: 1min_kline
    formula: "NEEDS_DATA_DICT: kurtosis(ret_1min) over trading_day"
    source: "NEEDS_DATA_DICT(需要分钟K线表)"
    fields: []
    recommended_suffix: [_std]
    reference_metrics:
      沪深300_monthly_ICIR: ">0.6"

  - factor_id: cicc_shape_skratio_2024
    name_cn: 分钟收益偏度比率
    name_en: Intraday Skewness Ratio
    category: higher_order
    subcategory: return_moments
    description: >
      日内分钟收益率的标准化偏度指标，skewness / sqrt(kurtosis)。
      综合考虑三阶和四阶矩的联合信息。
    direction: negative
    data_frequency: 1min_kline
    formula: "NEEDS_DATA_DICT: skewness(ret_1min) / sqrt(kurtosis(ret_1min)) over trading_day"
    source: "NEEDS_DATA_DICT(需要分钟K线表)"
    fields: []
    recommended_suffix: [_m]

  - factor_id: cicc_shape_volskew_2024
    name_cn: 分钟成交量占比偏度
    name_en: Intraday Volume Share Skewness
    category: higher_order
    subcategory: volume_moments
    description: >
      日内每分钟成交量占全天总成交量比例序列的偏度。
    direction: negative
    data_frequency: 1min_kline
    formula: "NEEDS_DATA_DICT: skewness(vol_1min / sum(vol_1min)) over trading_day"
    source: "NEEDS_DATA_DICT(需要分钟K线表)"
    fields: []
    recommended_suffix: [_m, _std]

  - factor_id: cicc_shape_volkurt_2024
    name_cn: 分钟成交量占比峰度
    name_en: Intraday Volume Share Kurtosis
    category: higher_order
    subcategory: volume_moments
    description: >
      日内每分钟成交量占全天总成交量比例序列的峰度。
    direction: negative
    data_frequency: 1min_kline
    formula: "NEEDS_DATA_DICT: kurtosis(vol_1min / sum(vol_1min)) over trading_day"
    source: "NEEDS_DATA_DICT(需要分钟K线表)"
    fields: []
    recommended_suffix: [_std]

  - factor_id: cicc_shape_volskratio_2024
    name_cn: 分钟成交量占比偏度比率
    name_en: Intraday Volume Share Skewness Ratio
    category: higher_order
    subcategory: volume_moments
    description: >
      日内成交量占比序列的标准化偏度指标。
    direction: negative
    data_frequency: 1min_kline
    formula: "NEEDS_DATA_DICT: skewness(vol_share) / sqrt(kurtosis(vol_share)) over trading_day"
    source: "NEEDS_DATA_DICT(需要分钟K线表)"
    fields: []
    recommended_suffix: [_m]

  # ===========================================================================
  # 第四大类: 流动性因子 (Liquidity)
  # 细分: 价格弹性因子、集合竞价因子
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # 4.1 价格弹性因子 (Price Elasticity)
  # ---------------------------------------------------------------------------

  - factor_id: cicc_liq_amihud_1min_2024
    name_cn: 1分钟Amihud非流动性
    name_en: 1-min Amihud Illiquidity
    category: liquidity
    subcategory: price_elasticity
    description: >
      日内1分钟级别的Amihud非流动性指标。
      衡量单位成交金额对价格的冲击程度，指标越高流动性越差。
    direction: positive
    data_frequency: 1min_kline
    formula: "NEEDS_DATA_DICT: mean(|ret_1min| / amount_1min) over trading_day"
    source: "NEEDS_DATA_DICT(需要分钟K线表)"
    fields: []
    recommended_suffix: [_o]
    reference_metrics:
      全市场_monthly_ICIR: "1.02"
      全市场_monthly_long_short_annual: "33%"
      全市场_weekly_long_short_annual: "40%"
    daily_approximation:
      formula: "abs(daily_unadj.pct_chg / 100.0) / daily_unadj.amount"
      source: daily_unadj
      fields: [pct_chg, amount]
      note: "日频近似，与报告中的1分钟高频版本有差异"

  - factor_id: cicc_liq_spread_2024
    name_cn: 买卖价差
    name_en: Bid-Ask Spread
    category: liquidity
    subcategory: price_elasticity
    description: >
      基于Level2盘口10档数据计算的日内买卖价差。
      spread = (best_ask - best_bid) / mid_price，取日内均值。
    direction: positive
    data_frequency: 3s_snapshot
    formula: "NEEDS_DATA_DICT: mean((ask_price_1 - bid_price_1) / ((ask_price_1 + bid_price_1)/2)) over snapshots"
    source: "NEEDS_DATA_DICT(需要3秒快照盘口数据表)"
    fields: []
    recommended_suffix: [_std]

  - factor_id: cicc_liq_avgDepthCct_2024
    name_cn: 加权盘口深度
    name_en: Weighted Order Book Depth
    category: liquidity
    subcategory: price_elasticity
    description: >
      基于Level2的10档盘口数据，计算买卖双方深度加权均值，
      反映当前挂单量的厚度。
    direction: positive
    data_frequency: 3s_snapshot
    formula: "NEEDS_DATA_DICT: mean(sum(bid_vol_i + ask_vol_i for i=1..10) / 2) over snapshots"
    source: "NEEDS_DATA_DICT(需要3秒快照盘口数据表)"
    fields: []
    recommended_suffix: [_o, _m]

  # ---------------------------------------------------------------------------
  # 4.2 集合竞价因子 (Auction / Intraday Volume Distribution)
  # ---------------------------------------------------------------------------

  - factor_id: cicc_liq_closevol_2024
    name_cn: 收盘前成交量占比
    name_en: Close Volume Ratio
    category: liquidity
    subcategory: auction
    description: >
      收盘前3分钟（14:57-15:00）成交量占全天总成交量的比例。
      反映尾盘集合竞价时段的流动性集中度。
    direction: negative
    data_frequency: 1min_kline
    formula: "NEEDS_DATA_DICT: sum(vol_1min[14:57..15:00]) / sum(vol_1min[day])"
    source: "NEEDS_DATA_DICT(需要分钟K线表)"
    fields: []
    recommended_suffix: [_z]
    reference_metrics:
      沪深300_weekly_ICIR: "0.21"
      沪深300_weekly_long_excess_annual: "5.4%"

  - factor_id: cicc_liq_openvol_2024
    name_cn: 开盘后成交量占比
    name_en: Open Volume Ratio
    category: liquidity
    subcategory: auction
    description: >
      开盘后3分钟（09:30-09:33）成交量占全天总成交量的比例。
    direction: negative
    data_frequency: 1min_kline
    formula: "NEEDS_DATA_DICT: sum(vol_1min[09:30..09:33]) / sum(vol_1min[day])"
    source: "NEEDS_DATA_DICT(需要分钟K线表)"
    fields: []
    recommended_suffix: [_o, _m]

  - factor_id: cicc_liq_closeprevol_2024
    name_cn: 集合竞价前成交量占比
    name_en: Pre-Auction Volume Ratio
    category: liquidity
    subcategory: auction
    description: >
      收盘集合竞价前一段时间的成交量占全天比例，反映尾盘活跃度。
    direction: negative
    data_frequency: 1min_kline
